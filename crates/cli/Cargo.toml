[package]
name = "cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish = false
description = "exub — command-line entry point for the exuberance trading engine."

[[bin]]
name = "exub"
path = "src/main.rs"

[dependencies]
exub-core = { path = "../core" }
market-data = { path = "../market-data" }
signals = { path = "../signals" }
vol = { path = "../vol" }
# The CLI is the composition root + surface, so the heavier deps live here (not in
# the offline core crates): clap for args, serde/toml for the config file layer,
# tracing for stderr logging, anyhow at the app boundary.
anyhow.workspace = true
clap.workspace = true
serde.workspace = true
toml.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
# The engine seams are async; the CLI drives one sequential command, so a current-thread runtime is plenty.
tokio = { workspace = true, features = ["rt", "macros"] }

[lints]
workspace = true
