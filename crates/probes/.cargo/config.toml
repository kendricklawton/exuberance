# The eBPF crate builds for the BPF target, not the host triple; `bpf-linker` (on PATH) links the
# LLVM bitcode rustc emits. `build-std = ["core"]` compiles `core` for `bpfel-unknown-none`, which
# rustup ships no prebuilt std for — hence the nightly toolchain pinned in `rust-toolchain.toml`.
[build]
target = "bpfel-unknown-none"

[unstable]
build-std = ["core"]

# `--btf` tells `bpf-linker` to emit the object's **BTF** (from the debug info the profile keeps): the
# `.BTF` section + BTF-defined maps, which make the program CO-RE-portable across kernels and let aya
# relocate it against the running kernel's BTF at load (see `docs/probes.md`). It is off by default, so pass it as a
# linker arg for this target.
[target.bpfel-unknown-none]
rustflags = ["-C", "link-arg=--btf"]
