# CI — the host-safe gate, one definition: every job runs `cargo xtask ci`, the same command a dev
# box runs, so this workflow cannot drift from the local gate. (It once did: this file used to
# hand-mirror the steps and silently missed the eBPF object build.) x86_64 only: the supported
# platform is x86_64 (decision 032 as narrowed); aarch64 support (and its matrix leg here) returns
# only with hardware to test the privileged path on.
#
# The privileged tests (booting a microVM, loading/attaching eBPF) need /dev/kvm + elevated caps
# and run under `cargo xtask ci-privileged` in ci-privileged-hosted.yml (nightly, nested KVM) —
# never gating the everyday loop. Scheduled companions: audit.yml (advisories vs the pinned lock,
# daily) and fuzz.yml (the deep libFuzzer tier, nightly).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  gate:
    name: gate (x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Everything `cargo xtask ci` needs, so none of its layers soft-skip here: stable
      # fmt/clippy, and the probes' nightly + rust-src (`build-std` for bpfel-unknown-none).
      - name: Install the toolchains
        run: |
          rustup component add rustfmt clippy
          rustup toolchain install nightly --profile minimal --component rust-src

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # The probes are their own workspace (own toolchain, own target dir); cache both.
          workspaces: |
            .
            crates/probes

      # Prebuilt binary, so the gate's `cargo deny check` layer has its tool.
      - name: Install cargo-deny
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-deny

      # No prebuilt binaries published; compiled once per cache key, then served from the
      # cached ~/.cargo/bin.
      - name: Install bpf-linker
        run: cargo install bpf-linker --locked

      - name: Run the gate
        run: cargo xtask ci

  # The single check to require in branch protection. Green only if every job above succeeded or
  # was skipped — add a job above and it's covered here automatically, no branch-rule edit needed.
  ci-status:
    name: CI status
    if: always()
    needs: [gate]
    runs-on: ubuntu-latest
    steps:
      - name: Verify every job passed
        run: jq --exit-status 'all(.result == "success" or .result == "skipped")' <<< '${{ toJson(needs) }}'
