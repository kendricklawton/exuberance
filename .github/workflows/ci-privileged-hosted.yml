# The x86_64 privileged gate on a GitHub-HOSTED runner. The hosted ubuntu x86_64 runners expose
# /dev/kvm (nested virtualization, since 2023), so this self-provisions everything the privileged
# path needs, KVM access, firecracker/jailer, net/fs tools, a SOURCE_DATE_EPOCH-capable mke2fs, the
# eBPF toolchain, the guest artifacts, and runs `cargo xtask ci-privileged` as root. Proven green
# end to end (boot, jailer, probes, restore, the audit record), so it runs nightly plus on demand.
# Correctness only: nested KVM makes performance numbers unrepresentative, so the benches are not
# gated here ("measured, not marketed" means measured on bare metal, by hand). This is the only
# privileged lane: the supported platform is x86_64 (decision 032 as narrowed).
#
# SECURITY: this runs untrusted-capable code as ROOT with KVM, so it must NEVER execute fork code.
# Triggers are schedule + manual dispatch, plus **same-repo** PRs that touch the isolation path. The
# job-level `if` skips every fork PR, and `pull_request` (NEVER `pull_request_target`) already denies a
# fork any secret or write token. Keep both guards: no `pull_request_target`, never drop the fork check.
name: CI (privileged, hosted)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
  # Same-repo PRs that touch the isolation path get the privileged gate per-change, not only nightly.
  # Fork PRs are excluded by the job's `if` (see SECURITY above). Scoped by path so a docs- or
  # CLI-only change does not spend 45 minutes booting a VM it cannot affect.
  pull_request:
    paths:
      - "crates/vmm/**"
      - "crates/probes/**"
      - "crates/probes-common/**"
      - "crates/probes-loader/**"
      - "crates/channel/**"
      - "crates/guest-agent/**"
      - "xtask/**"
      - ".github/workflows/ci-privileged-hosted.yml"

permissions:
  contents: read

concurrency:
  group: ci-privileged-hosted
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Any v1.9.x, the driver pins on major.minor (doctor probes it). Bump the patch as upstream moves.
  FC_VERSION: v1.9.1

jobs:
  hosted:
    name: VM boot + probe attach (ubuntu-24.04 hosted)
    # Fork guard (SECURITY, load-bearing): run for schedule/dispatch always, and for a PR only when the
    # head branch lives in THIS repo, never a fork. Root + KVM must never execute untrusted fork code.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Grant access to /dev/kvm
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Preflight, does this runner have KVM + BTF?
        run: |
          echo "kernel: $(uname -r)"
          test -e /dev/kvm \
            || { echo "::error::no /dev/kvm on this runner; run cargo xtask ci-privileged on a KVM box instead"; exit 1; }
          test -e /sys/kernel/btf/vmlinux \
            || { echo "::error::no BTF (/sys/kernel/btf/vmlinux); CO-RE eBPF cannot load here"; exit 1; }

      - name: Scratch dir off any nodev mount (the jailer's chroot /dev/kvm lives under it)
        run: |
          sudo mkdir -p /kee-scratch && sudo chmod 1777 /kee-scratch
          echo "KEE_SCRATCH_DIR=/kee-scratch" >> "$GITHUB_ENV"

      - name: Install host tools (firecracker + jailer + net/fs)
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2 e2fsprogs binutils curl
          url="https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VERSION}/firecracker-${FC_VERSION}-x86_64.tgz"
          curl -fsSL "$url" -o /tmp/fc.tgz && tar -C /tmp -xzf /tmp/fc.tgz
          sudo install -m0755 "/tmp/release-${FC_VERSION}-x86_64/firecracker-${FC_VERSION}-x86_64" /usr/local/bin/firecracker
          sudo install -m0755 "/tmp/release-${FC_VERSION}-x86_64/jailer-${FC_VERSION}-x86_64" /usr/local/bin/jailer
          firecracker --version

      - name: mke2fs >= 1.47.1 (noble ships 1.47.0, which ignores SOURCE_DATE_EPOCH)
        run: |
          # The reproducible-rootfs verify needs mke2fs to honor SOURCE_DATE_EPOCH (added in
          # e2fsprogs 1.47.1); Ubuntu 24.04's 1.47.0 silently ignores it and the two verify builds
          # differ. Build the one binary from a pinned release; it links the e2fs libs statically
          # by default, and /usr/local/sbin precedes /usr/sbin in PATH.
          ver="1.47.2"
          curl -fsSL "https://mirrors.edge.kernel.org/pub/linux/kernel/people/tytso/e2fsprogs/v${ver}/e2fsprogs-${ver}.tar.xz" -o /tmp/e2fsprogs.tar.xz
          tar -C /tmp -xJf /tmp/e2fsprogs.tar.xz
          cd "/tmp/e2fsprogs-${ver}"
          ./configure >/dev/null
          make -j"$(nproc)" >/dev/null
          sudo install -m0755 misc/mke2fs /usr/local/sbin/mke2fs
          mke2fs -V

      - name: Toolchains (nightly + rust-src + bpf-linker for the eBPF object; musl for the guest agent)
        run: |
          rustup toolchain install nightly --profile minimal --component rust-src
          rustup target add x86_64-unknown-linux-musl
          cargo install bpf-linker --locked

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            crates/probes

      - name: Build the guest artifacts + eBPF object
        run: |
          cargo xtask fetch-artifacts
          cargo xtask build-rootfs
          cargo xtask build-probes

      - name: Host check (report; non-blocking)
        run: |
          sudo -E env "PATH=$PATH" "RUSTUP_HOME=$HOME/.rustup" "CARGO_HOME=$HOME/.cargo" \
            "KEE_SCRATCH_DIR=$KEE_SCRATCH_DIR" cargo xtask setup || true

      - name: Run the privileged gate (root, for the jailer + eBPF caps)
        # `CARGO_TARGET_DIR` is required, not a nicety: the gate refuses to run as root without it,
        # because a root build into ./target leaves root-owned artifacts that block every later
        # non-root `cargo`. Here that is the cached ./target the earlier steps populated, so the
        # redirect keeps the cache reusable. The privileged tree is not cached (a root rebuild each
        # run is the price of not poisoning the one that is).
        run: |
          sudo -E env "PATH=$PATH" "RUSTUP_HOME=$HOME/.rustup" "CARGO_HOME=$HOME/.cargo" \
            "CARGO_TARGET_DIR=$PWD/target-privileged" \
            "KEE_SCRATCH_DIR=$KEE_SCRATCH_DIR" cargo xtask ci-privileged
