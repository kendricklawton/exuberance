# The deep fuzzing tier (docs/contributing-fuzzing.md): coverage-guided libFuzzer over the
# untrusted-input decoders, the host↔guest channel (guest-controlled bytes) and the signed-record
# envelope (attacker-relayed by design: a verifier checks a record without trusting the host that
# delivered it). The CI gate runs the cheap dependency-free property tests on every push; this
# runs the real fuzzer nightly, a bounded 15 minutes per target, through the same `cargo xtask
# fuzz` a dev box uses. A
# crash fails the run and uploads the reproducing input from fuzz/artifacts/ — feed the minimized
# reproducer back as a `crates/channel` unit test when fixing it.
name: fuzz

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  libfuzzer:
    name: fuzz ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        # Ordered by value: protocol_message is the daemon's outermost boundary (any client's bytes
        # off kee serve's socket); channel_response is the host reading guest-controlled bytes;
        # signing_envelope is the verifier reading a record relayed by an untrusted host. syscall_event
        # is defense-in-depth (the record is kernel-written; the tap frame is guest-crafted).
        target: [protocol_message, channel_response, signing_envelope, channel_request, channel_frame, channel_handshake, syscall_event]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install the nightly toolchain
        run: rustup toolchain install nightly --profile minimal

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # The fuzz harness is its own workspace; cache it alongside the root (for xtask).
          workspaces: |
            .
            fuzz

      # No prebuilt binary; compiled once per cache key, then served from the cached ~/.cargo/bin.
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz for 15 minutes
        run: cargo xtask fuzz ${{ matrix.target }} --seconds 900

      - name: Upload the crashing input
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
