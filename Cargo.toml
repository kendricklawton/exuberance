[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/market-data",
    "crates/vol",
    "crates/signals",
    "crates/store",
    "crates/cli",
    "xtask",
]

[workspace.package]
edition = "2021"
license = "Apache-2.0"
authors = ["k-henry <khe4r6@gmail.com>"]
repository = "exuberance"

# Keep the *core* crates (vol/signals/core) dependency-free so `cargo test` on them runs
# offline and fast. Heavier deps live at the edges: the CLI (config/logging/arg-parsing) and
# `xtask` (dev orchestration). The HTTP stack (reqwest/secrecy/serde_json) has now landed —
# but only behind `market-data/massive-live`, so a default build still compiles it in while
# `--no-default-features` keeps the lean, offline path (ROADMAP keystone 1 / Phase 7).
[workspace.dependencies]
anyhow = "1"
# Async seams: the provider traits are `async` so real HTTP feeds/models don't block. `async-trait` keeps
# them object-safe, so the engine can hold `Box<dyn MarketDataProvider>` / `Box<dyn AiProvider>` chosen at
# runtime from config (the whole point of a pluggable, multi-vendor engine).
async-trait = "0.1"
tokio = { version = "1", features = ["rt", "macros"] }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Live-feed HTTP stack — only pulled in behind `market-data/massive-live` (Phase 7).
# reqwest with rustls (no system OpenSSL); secrecy holds the API key so it can't leak to a log.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1"
secrecy = "0.10"
# Dev-only: a local mock HTTP server for the offline contract tests (drift fails CI, not a live scan).
wiremock = "0.6"
# Persistent IV-history store (Phase 8), behind the cli `sqlite` feature. `bundled` vendors the
# SQLite C amalgamation — no system libsqlite3, builds fully offline.
rusqlite = { version = "0.32", features = ["bundled"] }
# Dev-only: temp files/dirs for the store's persistence test.
tempfile = "3"

# No-panic discipline (Phase 6): a failed feed/model/broker call is a value (`Err`), never a crash.
# `unwrap`/`expect` are denied outside tests; `clippy.toml` re-allows them in tests. These are clippy
# restriction lints, enforced by the `clippy … -D warnings` step in CI and `cargo xtask ci`. Each crate
# opts in with `[lints] workspace = true`.
[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
