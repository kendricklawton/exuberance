# Detector manifest — labels this artifact may emit, and the size/latency budgets the gate
# enforces against the built wasm (P4.4). Generous absolute ceilings, not tuning targets.
id = "secrets"
version = "0.1.0"
labels = [
    "secret.aws_access_key_id",
    "secret.github_pat",
    "secret.private_key",
    "secret.high_entropy",
]

[budgets]
max_wasm_bytes = 262144 # 256 KiB
max_p99_micros = 8000   # 8 ms per call
